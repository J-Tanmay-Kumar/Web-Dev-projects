<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h3>Expense Tracker</h3>
        <input class="js-search" type="text" placeholder="Search expenses">
        <button class="search-btn">Search</button>
        <div class="head">
            <input type="text" placeholder="Expense-Name" class="js-expense-name">
            <input type="number" placeholder="Amount" class="js-expense-amount">
            <input type="date"  class="js-expense-date" name="date">
                <select name="category" class="js-category">
                    <option value="">Select category</option>
                    <option value="food">food</option>
                    <option value="Travell">Travell</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Grocery">Grocery</option>
                </select>
            <button class="add-btn">Add Expense</button>
        </div>
    </div>
<div class="body">
</div>
<div class="bottom">
</div>
<div class="End">
    
</div>
    <script  type="module"  src="script.js"></script>
</body>
</html>
