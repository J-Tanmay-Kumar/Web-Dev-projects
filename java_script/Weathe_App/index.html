<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather-App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-box">
        <h2>Weather-App</h2>
        <div class="search-space">
            <input type="text" placeholder="Enter city name" id="city">
            <button id="search">Get Weather</button>
        </div>
        <div class="city-details">
            <div class="city-name">Vijayawada</div>
            <div class="details">
                <div class="details-left">
                    <div class="temp">temperature:33°C</div>
                    <div class="condition">Condition:Cloudy</div>
                </div>
                <div class="details-right">
                    <div class="humidity">Humidity:64%</div>
                    <div class="windspeed">Wind:5km/h</div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
